# fly.toml app configuration file generated for hello-fly-private-q6k4yq on 2026-05-08T11:59:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hello-fly-private-1nhwsw'
primary_region = 'ams'

[env]
  NEVER_LISTEN = 1
  CRASH_ME = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "2s"`
    interval = "5s"
    method = "GET"
    path = "/"
    timeout = "2s"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  size = 'shared-cpu-1x'
