# fly.toml app configuration file generated for hello-fly-private-asdasd123 on 2026-05-25T13:56:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hello-fly-private-asdasd123'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app', 'replica']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  size = 'shared-cpu-1x'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  size = 'shared-cpu-1x'
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
  size = 'shared-cpu-1x'
  processes = ['replica']

[processes]
  app = ''
  replica = 'sleep inf'
