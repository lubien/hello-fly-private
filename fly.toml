# fly.toml app configuration file generated for hello-fly-privatef234 on 2026-05-28T20:51:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hello-fly-privatef234'
primary_region = 'ams'
console_command = 'bash'

[build]

[deploy]
  strategy = 'immediate'
  wait_timeout = '1m0s'
  release_command = 'sleep 1'
  release_command_timeout = '15s'

[processes]
  app = ''
  replica = ''

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app', 'replica']

[[restart]]
  policy = 'always'
  retries = 10
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
  processes = ['replica']
