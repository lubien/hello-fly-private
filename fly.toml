# fly.toml app configuration file generated for hello-fly-private-asdasd123 on 2026-05-26T18:26:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hello-fly-private-asdasd123'
primary_region = 'gru'
console_command = 'bash'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app', 'replica']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
  size = 'shared-cpu-1x'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
  size = 'shared-cpu-1x'
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  size = 'shared-cpu-1x'
  processes = ['replica']

[processes]
  app = ''
  replica = ''

[deploy]
  strategy = 'immediate'
  wait_timeout = '1m'
  release_command = 'sleep 1'
  release_command_timeout = '15s'

[[restart]]
  policy = 'always'
  processes = ['app']
  retries = 9
