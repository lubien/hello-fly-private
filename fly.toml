# fly.toml app configuration file generated for hello-fly-private-1nhwsw on 2026-05-13T11:10:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hello-fly-private-1nhwsw'
primary_region = 'ams'

[env]
  N2EVER_LISTEN = 1
  CRASH_NOW = 1

[deploy]
  strategy = 'bluegreen'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "2s"
    interval = "5s"
    method = "GET"
    path = "/"
    timeout = "2s"

# [checks]
#   [checks.alive]
#     type = "http"
#     port = 8080
#     method = "get"
#     path = "/"
#     interval = "5s"
#     timeout = "2s"
#     grace_period = "2s"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
